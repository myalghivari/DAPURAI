<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAPURALGHIAI</title>
    <script>
      // Runtime fix for libraries attempting to redefine window.fetch (e.g. node-fetch, protobufjs)
      // which causes errors in environments where window.fetch is a non-writable getter.
      (function() {
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If we can't redefine it, we just hope for the best or it's already safe
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
